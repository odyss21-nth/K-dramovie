<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생역전! 무료 로또 번호 추출기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-ticket-alt"></i> 인생역전 로또 번호</h1>
            <p>매주 행운을 드리는 100% 무료 번호 생성 서비스</p>
        </header>

        <main>
            <section class="generator-card">
                <div class="card-header">
                    <h2>오늘의 행운 번호</h2>
                    <button id="generate-btn">번호 생성하기 <i class="fas fa-magic"></i></button>
                </div>
                
                <div id="numbers-display" class="numbers-container">
                    <div class="placeholder">버튼을 눌러 번호를 생성하세요!</div>
                </div>

                <div class="history-section">
                    <h3>최근 생성 내역</h3>
                    <ul id="history-list">
                        <!-- 생성된 번호 리스트가 여기에 추가됨 -->
                    </ul>
                </div>
            </section>

            <section class="info-section">
                <div class="info-box">
                    <i class="fas fa-chart-line"></i>
                    <h3>통계 기반 추출</h3>
                    <p>가상의 통계 알고리즘을 활용하여 최적의 조합을 추천합니다.</p>
                </div>
                <div class="info-box">
                    <i class="fas fa-shield-alt"></i>
                    <h3>100% 무료</h3>
                    <p>회원가입 없이 누구나 무료로 이용 가능합니다.</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 인생역전 무료 로또. 본 서비스는 재미를 위한 도구이며 당첨을 보장하지 않습니다.</p>
        </footer>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
